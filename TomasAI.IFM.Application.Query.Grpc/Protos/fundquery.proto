syntax = "proto3";

option csharp_namespace = "TomasAI.IFM.Application.Query.Grpc";

package fundquery;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// The greeting service definition.
service FundQuery {
  // Sends a greeting
  rpc GetFunds (GetFundsRequest) returns (GetFundsReply);
}

message FundModel {
    int32 fundId = 1;
    string name = 2;
    google.protobuf.StringValue description = 3;
    double balance = 4;
    google.protobuf.Timestamp createdOn = 5;
    google.protobuf.StringValue createdBy = 6;
    repeated FundOrderModel orders = 7;
}

message FundOrderModel {
    int32 fundId = 1;
    int32 orderId = 2;
    google.protobuf.Timestamp orderDate = 3;
    string orderStatus = 4;
    google.protobuf.StringValue reference = 5;
    google.protobuf.Timestamp createdOn = 6;
    google.protobuf.StringValue createdBy = 7;
    google.protobuf.Timestamp updatedOn = 8;
    google.protobuf.StringValue updatedBy = 9;
    repeated FundOrderTradeModel trades = 10;
}

message FundOrderTradeModel {
    int32 orderId = 1;
    int32 tradeId = 2;
    string tradeType = 3;
    google.protobuf.Timestamp tradeDate = 4;
    google.protobuf.Timestamp maturityDate = 5;
    string tradeState = 6;
    string tradeAction = 7;
    google.protobuf.StringValue reference = 8;
    bool primaryTrade = 9;
    google.protobuf.Timestamp createdOn = 10;
    google.protobuf.StringValue createdBy = 11;
}

// The request message containing the user's name.
message GetFundsRequest {
}

// The response message containing the greetings.
message GetFundsReply {
  repeated FundModel funds = 1;
}
